version: "3.8"

services:
  agentos:
    build: .
    ports:
      - "8340:8340"
    volumes:
      - ./data:/app/data          # Persist SQLite DB
      - ./agents:/app/agents      # Agent definitions
      - ./tools:/app/tools        # Tool plugins
      - ./eval:/app/eval          # Eval tasks
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8340/health"]
      interval: 30s
      timeout: 5s
      retries: 3
