name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pyyaml python-multipart

      - name: Run tests
        env:
          E2B_API_KEY: ""
          GMI_API_KEY: ""
          ANTHROPIC_API_KEY: ""
          OPENAI_API_KEY: ""
        run: |
          python -m pytest tests/ -q --tb=short

      - name: Check import
        run: python -c "import agentos; print(f'AgentOS {agentos.__version__}')"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Check syntax
        run: python -m py_compile agentos/cli.py agentos/agent.py agentos/api/app.py
