name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Control Plane (Cloudflare Worker) ──────────────────────────────
  control-plane:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Deploy
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ── Runtime Worker (Cloudflare Worker + DO + Containers) ───────────
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - name: Test
        run: npm test
      - name: Deploy
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ── Live Infra Gate (staging/prod-like) ────────────────────────────────
  # Runs only when E2E secrets are configured.
  e2e-infra-gate:
    runs-on: ubuntu-latest
    if: ${{ secrets.E2E_CONTROL_PLANE_URL != '' && secrets.E2E_RUNTIME_URL != '' && secrets.E2E_SERVICE_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Run staged infrastructure gate
        run: bash scripts/e2e_infra_gate.sh
        env:
          E2E_CONTROL_PLANE_URL: ${{ secrets.E2E_CONTROL_PLANE_URL }}
          E2E_RUNTIME_URL: ${{ secrets.E2E_RUNTIME_URL }}
          E2E_SERVICE_TOKEN: ${{ secrets.E2E_SERVICE_TOKEN }}
          E2E_AGENT_NAME: ${{ secrets.E2E_AGENT_NAME }}
          E2E_ORG_ID: ${{ secrets.E2E_ORG_ID }}
          E2E_TIMEOUT_SECONDS: 180
          E2E_SOAK_ENABLED: 1
          E2E_SOAK_PARALLEL: 8
          E2E_SOAK_REQUESTS: 24
          E2E_SOAK_MAX_FAILURE_RATE: 0.10

  # ── MVP Frontend (Cloudflare Workers Static Assets) ────────────────
  mvp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mvp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Deploy
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
