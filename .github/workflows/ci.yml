name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Control Plane (Cloudflare Worker) ──────────────────────────────
  control-plane:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Deploy control-plane
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        continue-on-error: true
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ── Runtime Worker (Cloudflare Worker + DO + Containers) ───────────
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - name: Sandbox image E2E (assistant-office profile)
        run: bash ../scripts/e2e_sandbox_office_image.sh
      - name: Test
        run: npm test
      - name: Deploy runtime
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        continue-on-error: true
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ── UI (SvelteKit + Cloudflare Workers Static Assets) ─────────────
  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Deploy UI
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        continue-on-error: true
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ── Live E2E Infra Gate (runs only when secrets are configured) ───
  e2e-infra-gate:
    runs-on: ubuntu-latest
    needs: [control-plane, deploy, ui]
    # Secrets can't be checked in job-level `if`. Use environment check in step instead.
    steps:
      - uses: actions/checkout@v4
      - name: Run E2E infrastructure gate
        if: env.E2E_SERVICE_TOKEN != ''
        run: bash scripts/e2e_infra_gate.sh
        env:
          E2E_CONTROL_PLANE_URL: ${{ secrets.E2E_CONTROL_PLANE_URL }}
          E2E_RUNTIME_URL: ${{ secrets.E2E_RUNTIME_URL }}
          E2E_SERVICE_TOKEN: ${{ secrets.E2E_SERVICE_TOKEN }}
          E2E_AGENT_NAME: ${{ secrets.E2E_AGENT_NAME }}
          E2E_ORG_ID: ${{ secrets.E2E_ORG_ID }}
          E2E_TIMEOUT_SECONDS: 180
          E2E_SOAK_ENABLED: 1
          E2E_SOAK_PARALLEL: 8
          E2E_SOAK_REQUESTS: 24
          E2E_SOAK_MAX_FAILURE_RATE: 0.10
      - name: Skip notice
        if: env.E2E_SERVICE_TOKEN == ''
        run: echo "E2E gate skipped — E2E_SERVICE_TOKEN not configured"
        env:
          E2E_SERVICE_TOKEN: ${{ secrets.E2E_SERVICE_TOKEN }}

  # ── Pre-Beta Health Suite (manual trigger) ─────────────────────────────
  pre-beta-health:
    runs-on: ubuntu-latest
    needs: [control-plane, deploy, ui]
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Run pre-beta health suite
        if: env.E2E_SERVICE_TOKEN != '' && env.E2E_USER_EMAIL != '' && env.E2E_USER_PASSWORD != ''
        run: bash scripts/pre_beta_health_suite.sh
        env:
          E2E_CONTROL_PLANE_URL: ${{ secrets.E2E_CONTROL_PLANE_URL }}
          E2E_RUNTIME_URL: ${{ secrets.E2E_RUNTIME_URL }}
          E2E_SERVICE_TOKEN: ${{ secrets.E2E_SERVICE_TOKEN }}
          E2E_AGENT_NAME: ${{ secrets.E2E_AGENT_NAME }}
          E2E_ORG_ID: ${{ secrets.E2E_ORG_ID }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_TIMEOUT_SECONDS: 180
          PREBETA_RUN_INFRA_GATE: 1
      - name: Skip notice
        if: env.E2E_SERVICE_TOKEN == '' || env.E2E_USER_EMAIL == '' || env.E2E_USER_PASSWORD == ''
        run: echo "Pre-beta suite skipped — set E2E_SERVICE_TOKEN, E2E_USER_EMAIL, and E2E_USER_PASSWORD secrets"
        env:
          E2E_SERVICE_TOKEN: ${{ secrets.E2E_SERVICE_TOKEN }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
