$kind: http-request
name: Execute Graph
method: POST
url: '{{base_url}}/api/v1/graphs/execute'
order: 10000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{api_token}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "graph": {
        "nodes": [
          {"id": "start", "type": "input"},
          {"id": "llm", "type": "llm", "config": {"model": "gpt-4o"}},
          {"id": "end", "type": "output"}
        ],
        "edges": [
          {"from": "start", "to": "llm"},
          {"from": "llm", "to": "end"}
        ]
      },
      "input": "Hello, world!",
      "agent_context": {
        "agent_name": "{{agent_name}}",
        "org_id": "{{org_id}}"
      }
    }
