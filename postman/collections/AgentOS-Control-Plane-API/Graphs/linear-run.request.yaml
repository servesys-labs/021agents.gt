$kind: http-request
name: Linear Graph Run
method: POST
url: '{{base_url}}/api/v1/graphs/linear-run'
order: 8000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{api_token}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "graph": {
        "nodes": [
          {"id": "start", "type": "input"},
          {"id": "llm", "type": "llm", "config": {"model": "gpt-4o"}},
          {"id": "end", "type": "output"}
        ],
        "edges": [
          {"from": "start", "to": "llm"},
          {"from": "llm", "to": "end"}
        ]
      },
      "task": "Summarize the following text",
      "agent_context": {
        "agent_name": "{{agent_name}}",
        "org_id": "{{org_id}}",
        "channel": "staging"
      },
      "initial_state": {}
    }
