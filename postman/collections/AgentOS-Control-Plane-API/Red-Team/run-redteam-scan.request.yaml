$kind: http-request
name: Run Red Team Scan
method: POST
url: '{{base_url}}/api/v1/redteam/scan/{{agent_name}}'
order: 2000
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: agent_name
    value: '{{agent_name}}'
body:
  type: json
  content: |-
    {
      "probe_categories": ["prompt_injection", "jailbreak", "data_exfiltration"],
      "intensity": "medium"
    }
