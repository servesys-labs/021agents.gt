$kind: http-request
name: List Webhook Deliveries
method: GET
url: '{{base_url}}/api/v1/webhooks/{{webhook_id}}/deliveries'
order: 6000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{api_token}}'
pathVariables:
  - key: webhook_id
    value: '{{webhook_id}}'
queryParams:
  - key: limit
    value: '50'
