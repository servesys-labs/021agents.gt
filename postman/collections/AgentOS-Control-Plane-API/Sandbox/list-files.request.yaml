$kind: http-request
name: List Files
method: GET
url: '{{base_url}}/api/v1/sandbox/{{sandbox_id}}/files'
order: 5000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{api_token}}'
pathVariables:
  - key: sandbox_id
    value: '{{sandbox_id}}'
queryParams:
  - key: path
    value: /
