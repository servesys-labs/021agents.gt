$kind: http-request
name: Save Canvas Layout
method: PUT
url: '{{base_url}}/api/v1/projects/{{project_id}}/canvas-layout'
order: 7000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{api_token}}'
pathVariables:
  - key: project_id
    value: '{{project_id}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "nodes": [
        {
          "id": "agent-1",
          "type": "agent",
          "position": { "x": 100, "y": 200 },
          "data": { "label": "My Agent" }
        }
      ],
      "edges": []
    }
