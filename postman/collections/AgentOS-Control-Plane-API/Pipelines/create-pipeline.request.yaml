$kind: http-request
name: Create Pipeline
method: POST
url: '{{base_url}}/api/v1/pipelines'
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{api_token}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "agent-event-pipeline",
      "description": "Pipeline for agent events",
      "source": { "type": "http" },
      "transforms": [],
      "sink_ids": []
    }
