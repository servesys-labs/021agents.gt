$kind: http-request
name: Test Guardrail
method: POST
url: '{{base_url}}/api/v1/guardrails/test'
order: 9000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{api_token}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "text": "Test input for guardrail evaluation",
      "policy_id": "{{policy_id}}"
    }
