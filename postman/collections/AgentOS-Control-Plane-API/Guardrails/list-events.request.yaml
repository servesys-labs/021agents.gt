$kind: http-request
name: List Guardrail Events
method: GET
url: '{{base_url}}/api/v1/guardrails/events'
order: 7000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{api_token}}'
queryParams:
  - key: limit
    value: '50'
  - key: agent_name
    value: '{{agent_name}}'
    disabled: true
