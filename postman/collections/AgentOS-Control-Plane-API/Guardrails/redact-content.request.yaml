$kind: http-request
name: Redact Content
method: POST
url: '{{base_url}}/api/v1/guardrails/redact'
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{api_token}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "text": "My SSN is 123-45-6789 and email is user@example.com",
      "patterns": ["ssn", "email", "phone"]
    }
