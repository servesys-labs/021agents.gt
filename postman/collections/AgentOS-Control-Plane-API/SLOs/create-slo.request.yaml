$kind: http-request
name: Create SLO
method: POST
url: '{{base_url}}/api/v1/slos'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "response-time-slo",
      "agent_name": "{{agent_name}}",
      "metric": "p99_latency_ms",
      "target": 2000,
      "window_days": 30
    }
