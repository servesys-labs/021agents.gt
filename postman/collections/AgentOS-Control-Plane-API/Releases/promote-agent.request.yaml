$kind: http-request
name: Promote Agent
method: POST
url: '{{base_url}}/api/v1/releases/{{agent_name}}/promote'
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{api_token}}'
pathVariables:
  - key: agent_name
    value: '{{agent_name}}'
body:
  type: json
  content: |-
    {
      "from_channel": "draft",
      "to_channel": "staging",
      "override": false,
      "approved_by": ""
    }
