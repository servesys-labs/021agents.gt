$kind: http-request
name: Tool Call
method: POST
url: '{{base_url}}/api/v1/runtime-proxy/tool/call'
order: 3000
headers:
  - key: Content-Type
    value: application/json
  - key: X-Edge-Token
    value: '{{service_token}}'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{api_token}}'
body:
  type: json
  content: |-
    {
      "tool": "web_search",
      "args": {"query": "latest AI news"}
    }
