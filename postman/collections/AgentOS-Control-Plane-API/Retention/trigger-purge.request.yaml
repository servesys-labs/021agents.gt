$kind: http-request
name: Trigger Data Purge
method: POST
url: '{{base_url}}/api/v1/retention/purge'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "resource_type": "sessions",
      "older_than_days": 90,
      "dry_run": true
    }
