$kind: http-request
name: Analyze Agent for Evolution
method: POST
url: '{{base_url}}/api/v1/evolve/{{agent_name}}/analyze'
order: 1000
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: agent_name
    value: '{{agent_name}}'
body:
  type: json
  content: |-
    {
      "focus": "performance",
      "session_window": 100
    }
