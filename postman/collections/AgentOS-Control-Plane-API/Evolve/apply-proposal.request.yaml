$kind: http-request
name: Apply Evolution Proposal
method: POST
url: '{{base_url}}/api/v1/evolve/{{agent_name}}/proposals/{{proposal_id}}/apply'
order: 4000
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: agent_name
    value: '{{agent_name}}'
  - key: proposal_id
    value: '{{proposal_id}}'
body:
  type: json
  content: |-
    {
      "dry_run": false
    }
