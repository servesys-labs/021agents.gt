$kind: http-request
name: Post Observability Feedback
method: POST
url: '{{base_url}}/api/v1/observability/feedback'
order: 11000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "session_id": "{{session_id}}",
      "rating": 5,
      "comment": "Excellent response quality"
    }
