$kind: http-request
name: Telegram Webhook
method: POST
url: '{{base_url}}/api/v1/chat/telegram/webhook'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "update_id": 123456789,
      "message": {
        "message_id": 1,
        "chat": { "id": 987654321, "type": "private" },
        "text": "Hello agent"
      }
    }
