$kind: collection
name: AgentOS Control Plane API
description: |-
  Complete API collection for the AgentOS Control Plane.
  Covers all 65 route families including Auth, Agents, Sessions, Billing,
  Security, Observability, Workflows, Eval, Memory, Tools, RAG, Releases,
  Graphs, Secrets, Webhooks, and more.

  Use {{base_url}} for the API host and {{api_token}} for Bearer auth.
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{api_token}}'
variables:
  - key: base_url
    value: 'https://agentos-control-plane.servesys.workers.dev'
    description: Control plane base URL
  - key: api_token
    value: ''
    description: Bearer token for authentication
  - key: agent_name
    value: my-agent
    description: Agent name (slug)
  - key: agentId
    value: ''
    description: Agent UUID
  - key: session_id
    value: ''
    description: Session UUID
  - key: org_id
    value: ''
    description: Organization ID
  - key: project_id
    value: ''
    description: Project ID
  - key: workflow_id
    value: ''
    description: Workflow ID
  - key: run_id
    value: ''
    description: Eval / workflow run ID
  - key: trace_id
    value: ''
    description: Trace ID
  - key: webhook_id
    value: ''
    description: Webhook ID
  - key: delivery_id
    value: ''
    description: Webhook delivery ID
  - key: webhook_secret
    value: ''
    description: Webhook signing secret
  - key: secret_name
    value: MY_SECRET
    description: Secret name in vault
  - key: key_id
    value: ''
    description: API key ID
  - key: schedule_id
