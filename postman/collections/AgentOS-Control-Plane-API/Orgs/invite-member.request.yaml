$kind: http-request
name: Invite Org Member
method: POST
url: '{{base_url}}/api/v1/orgs/{{org_id}}/members'
order: 6000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{api_token}}'
pathVariables:
  - key: org_id
    value: '{{org_id}}'
body:
  type: json
  content: |-
    {
      "email": "newmember@example.com",
      "role": "member"
    }
