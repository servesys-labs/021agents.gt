$kind: http-request
name: Remove Org Member
method: DELETE
url: '{{base_url}}/api/v1/orgs/{{org_id}}/members/{{member_user_id}}'
order: 8000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{api_token}}'
pathVariables:
  - key: org_id
    value: '{{org_id}}'
  - key: member_user_id
    value: '{{member_user_id}}'
