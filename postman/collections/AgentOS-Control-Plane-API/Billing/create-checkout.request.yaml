$kind: http-request
name: Create Checkout Session
method: POST
url: '{{base_url}}/api/v1/billing/checkout'
order: 5000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "plan": "pro",
      "success_url": "https://app.example.com/billing/success",
      "cancel_url": "https://app.example.com/billing/cancel"
    }
