$kind: http-request
name: Upload Tasks
method: POST
url: '{{base_url}}/api/v1/eval/tasks/upload'
order: 16000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{api_token}}'
body:
  type: json
  content: |-
    {
      "name": "my-task-set",
      "tasks": [
        {"input": "What is 2+2?", "expected": "4"},
        {"input": "Capital of France?", "expected": "Paris"}
      ]
    }
