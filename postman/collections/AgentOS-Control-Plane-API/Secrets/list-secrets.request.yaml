$kind: http-request
name: List Secrets
method: GET
url: '{{base_url}}/api/v1/secrets'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{api_token}}'
queryParams:
  - key: project_id
    value: '{{project_id}}'
    disabled: true
  - key: env
    value: production
    disabled: true
