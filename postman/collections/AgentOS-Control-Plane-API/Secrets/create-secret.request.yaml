$kind: http-request
name: Create Secret
method: POST
url: '{{base_url}}/api/v1/secrets'
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{api_token}}'
body:
  type: json
  content: |-
    {
      "name": "MY_API_KEY",
      "value": "super-secret-value",
      "project_id": "{{project_id}}",
      "env": "production"
    }
