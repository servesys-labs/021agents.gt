$kind: http-request
name: Delete Secret
method: DELETE
url: '{{base_url}}/api/v1/secrets/{{secret_name}}'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{api_token}}'
pathVariables:
  - key: secret_name
    value: '{{secret_name}}'
queryParams:
  - key: project_id
    value: '{{project_id}}'
    disabled: true
  - key: env
    value: production
    disabled: true
