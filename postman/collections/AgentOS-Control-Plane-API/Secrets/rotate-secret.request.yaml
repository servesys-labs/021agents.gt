$kind: http-request
name: Rotate Secret
method: POST
url: '{{base_url}}/api/v1/secrets/{{secret_name}}/rotate'
order: 4000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{api_token}}'
pathVariables:
  - key: secret_name
    value: '{{secret_name}}'
body:
  type: json
  content: |-
    {
      "new_value": "new-super-secret-value",
      "project_id": "{{project_id}}",
      "env": "production"
    }
