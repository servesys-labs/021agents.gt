$kind: http-request
name: Triage Issue
method: POST
url: '{{base_url}}/api/v1/issues/{{issue_id}}/triage'
order: 9000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{api_token}}'
pathVariables:
  - key: issue_id
    value: '{{issue_id}}'
body:
  type: json
  content: |-
    {
      "priority": "high",
      "assignee": "{{user_id}}",
      "labels": ["regression", "needs-investigation"]
    }
