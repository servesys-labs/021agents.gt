$kind: http-request
name: Update Issue
method: PUT
url: '{{base_url}}/api/v1/issues/{{issue_id}}'
order: 6000
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: issue_id
    value: '{{issue_id}}'
body:
  type: json
  content: |-
    {
      "status": "in_progress",
      "assignee": "user@example.com"
    }
