$kind: http-request
name: Stream Agent Run (Public)
method: POST
url: '{{base_url}}/v1/agents/{{agent_name}}/run/stream'
order: 3000
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: agent_name
    value: '{{agent_name}}'
body:
  type: json
  content: |-
    {
      "input": "Explain quantum computing in simple terms"
    }
