$kind: http-request
name: Sign Up
method: POST
url: '{{base_url}}/api/v1/auth/signup'
order: 1000
auth:
  type: noauth
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "user@example.com",
      "password": "securepassword",
      "name": "John Doe"
    }
