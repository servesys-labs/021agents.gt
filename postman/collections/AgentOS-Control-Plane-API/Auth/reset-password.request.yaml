$kind: http-request
name: Reset Password
method: POST
url: '{{base_url}}/api/v1/auth/reset-password'
order: 8000
auth:
  type: noauth
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "token": "reset-token-from-email",
      "new_password": "newpassword123"
    }
