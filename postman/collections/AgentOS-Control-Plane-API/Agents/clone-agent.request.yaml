$kind: http-request
name: Clone Agent
method: POST
url: '{{base_url}}/api/v1/agents/{{agentId}}/clone'
order: 9000
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: agentId
    value: '{{agentId}}'
body:
  type: json
  content: |-
    {
      "new_name": "my-agent-clone"
    }
