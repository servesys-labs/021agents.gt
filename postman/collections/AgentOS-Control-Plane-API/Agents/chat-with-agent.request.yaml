$kind: http-request
name: Chat with Agent
method: POST
url: '{{base_url}}/api/v1/agents/{{agent_name}}/chat'
order: 20000
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: agent_name
    value: '{{agent_name}}'
body:
  type: json
  content: |-
    {
      "message": "Hello! Can you help me?",
      "conversation_id": "{{session_id}}"
    }
