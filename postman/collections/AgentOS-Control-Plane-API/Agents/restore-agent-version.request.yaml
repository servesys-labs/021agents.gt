$kind: http-request
name: Restore Agent Version
method: POST
url: '{{base_url}}/api/v1/agents/{{agentId}}/versions/{{commitId}}/restore'
order: 13000
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: agentId
    value: '{{agentId}}'
  - key: commitId
    value: abc123def456
