$kind: http-request
name: Cancel Scan
method: POST
url: '{{base_url}}/api/v1/redteam/scans/{{scan_id}}/cancel'
order: 3000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{api_token}}'
pathVariables:
  - key: scan_id
    value: '{{scan_id}}'
body:
  type: json
  content: |-
    {}
