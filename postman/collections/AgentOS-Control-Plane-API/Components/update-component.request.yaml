$kind: http-request
name: Update Component
method: PUT
url: '{{base_url}}/api/v1/components/{{component_id}}'
order: 4000
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: component_id
    value: '{{component_id}}'
body:
  type: json
  content: |-
    {
      "description": "Updated component description",
      "config": {}
    }
