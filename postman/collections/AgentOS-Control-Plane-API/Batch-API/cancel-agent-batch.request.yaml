$kind: http-request
name: Cancel Agent Batch
method: DELETE
url: '{{base_url}}/v1/agents/{{agent_name}}/batches/{{batch_id}}'
order: 7000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{api_token}}'
pathVariables:
  - key: agent_name
    value: '{{agent_name}}'
  - key: batch_id
    value: '{{batch_id}}'
