$kind: http-request
name: List Batch Jobs
method: GET
url: '{{base_url}}/api/v1/agents/{{agent_name}}/batches'
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{api_token}}'
pathVariables:
  - key: agent_name
    value: '{{agent_name}}'
queryParams:
  - key: limit
    value: '20'
  - key: status
    value: ''
    disabled: true
