$kind: http-request
name: Create Gold Image from Agent
method: POST
url: '{{base_url}}/api/v1/gold-images/from-agent/{{agent_name}}'
order: 3000
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: agent_name
    value: '{{agent_name}}'
body:
  type: json
  content: |-
    {
      "description": "Snapshot from current agent state"
    }
