    enabled: true
  - key: proposal_id
    value: ''
    enabled: true
  - key: image_id
    value: ''
    enabled: true
  - key: issue_id
    value: ''
    enabled: true
  - key: batch_id
    value: ''
    enabled: true
  - key: slo_id
    value: ''
    enabled: true
  - key: scan_id
    value: ''
    enabled: true
  - key: dataset_name
    value: ''
    enabled: true
  - key: evaluator_name
    value: ''
    enabled: true
  - key: policy_id
    value: ''
    enabled: true
  - key: service_token
    value: ''
    enabled: true
    secret: true
